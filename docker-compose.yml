services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./backend/laravel:/var/www/html
    depends_on:
      - mysql
    networks:
      - azveria_frontend
      - azveria_backend

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "18080:80"
    volumes:
      - ./backend/laravel:/var/www/html
      - ./backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - app
    networks:
      - azveria_frontend

  websocket:
    build:
      context: ./backend/websocket
      dockerfile: Dockerfile
    ports:
      - "18081:8081"
    environment:
      - WS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:18080
      - JWT_SHARED_SECRET=${JWT_SHARED_SECRET:-change_me}
    depends_on:
      - mysql
    networks:
      - azveria_frontend
      - azveria_backend

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: azveria
      MYSQL_USER: azveria
      MYSQL_PASSWORD: azveria
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d:ro
    networks:
      - azveria_backend

volumes:
  mysql_data:
  nginx_cache:

networks:
  azveria_frontend:
    driver: bridge
  azveria_backend:
    driver: bridge
