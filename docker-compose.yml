services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /var/www/html
    command: >-
      sh -lc "mkdir -p /var/www/html/storage/app/public
      /var/www/html/storage/framework/cache
      /var/www/html/storage/framework/sessions
      /var/www/html/storage/framework/views
      /var/www/html/storage/logs
      && chown -R www-data:www-data /var/www/html/storage
      && exec php-fpm"
    volumes:
      - laravel_storage:/var/www/html/storage
    depends_on:
      - mysql
    networks:
      - azveria_frontend
      - azveria_backend

  nginx:
    build:
      context: ./backend
      dockerfile: docker/nginx/Dockerfile
    ports:
      - "18080:80"
    volumes:
      - laravel_storage:/var/www/html/storage
      - nginx_cache:/var/cache/nginx
    depends_on:
      - app
    networks:
      - azveria_frontend

  websocket:
    build:
      context: ./backend/websocket
      dockerfile: Dockerfile
    ports:
      - "18081:8081"
    environment:
      - WS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:18080
      - JWT_SHARED_SECRET=${JWT_SHARED_SECRET:-change_me}
    depends_on:
      - mysql
    networks:
      - azveria_frontend
      - azveria_backend

  mysql:
    build:
      context: .
      dockerfile: database/mysql/Dockerfile
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: azveria
      MYSQL_USER: azveria
      MYSQL_PASSWORD: azveria
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - azveria_backend

volumes:
  mysql_data:
  laravel_storage:
  nginx_cache:

networks:
  azveria_frontend:
    driver: bridge
  azveria_backend:
    driver: bridge
