services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: azveria_app
    working_dir: /var/www/html
    volumes:
      - ./backend/laravel:/var/www/html
    depends_on:
      - mysql
    networks:
      - azveria_net

  nginx:
    image: nginx:1.27-alpine
    container_name: azveria_nginx
    ports:
      - "8080:80"
    volumes:
      - ./backend/laravel:/var/www/html
      - ./backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - azveria_net

  websocket:
    build:
      context: ./backend/websocket
      dockerfile: Dockerfile
    container_name: azveria_websocket
    ports:
      - "8081:8081"
    environment:
      - WS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:8080
      - JWT_SHARED_SECRET=${JWT_SHARED_SECRET:-change_me}
    depends_on:
      - mysql
    networks:
      - azveria_net

  mysql:
    image: mysql:8.4
    container_name: azveria_mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: azveria
      MYSQL_USER: azveria
      MYSQL_PASSWORD: azveria
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d:ro
    networks:
      - azveria_net

volumes:
  mysql_data:

networks:
  azveria_net:
    driver: bridge
